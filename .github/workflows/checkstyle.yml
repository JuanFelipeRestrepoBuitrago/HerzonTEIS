name: Code Quality Gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checkstyle:
    name: 'Checkstyle Validation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21.0.3
          distribution: oracle
          cache: maven
      
      - name: Run Checkstyle
        run: ./mvnw clean checkstyle:check